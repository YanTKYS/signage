 <div class="menubar"><div class="menuGroup"><b>iSignage</b><button id="newBtn">新規</button><button id="saveBtn">保存</button><button id="exportBtn">JSON出力</button><button id="importBtn">JSON読込</button><button id="resetBtn" class="danger">初期化</button><input id="importFile" type="file" accept="application/json"></div><button id="playBtn" class="primary">▶ 表示開始</button></div>

<script>
(()=>{'use strict';
const W=1920,H=1080,DB='isignage-db',STORE='state',HANDLE='handles';
const $=s=>document.querySelector(s), uid=()=> 'id_'+Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const imgExt=/\.(jpe?g|png|gif|webp|bmp)$/i, vidExt=/\.(mp4|webm|ogg|mov|m4v)$/i;
function clone(o){return structuredClone(o)} function clamp(v,a,b){return Math.max(a,Math.min(b,Number(v)||0))} function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
class DBM{constructor(){this.db=null} async open(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,1);r.onupgradeneeded=()=>{r.result.createObjectStore(STORE);r.result.createObjectStore(HANDLE)};r.onsuccess=()=>{this.db=r.result;res()};r.onerror=()=>rej(r.error)})} tx(s,m='readonly'){return this.db.transaction(s,m).objectStore(s)} async get(s,k){return new Promise(r=>{const q=this.tx(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=()=>r(null)})} async put(s,k,v){return new Promise((r,j)=>{const q=this.tx(s,'readwrite').put(v,k);q.onsuccess=()=>r();q.onerror=()=>j(q.error)})} async del(s,k){return new Promise(r=>{const q=this.tx(s,'readwrite').delete(k);q.onsuccess=()=>r()})}}
class App{constructor(){this.db=new DBM();this.state=this.fresh();this.sel=[];this.clip=[];this.undo=[];this.redo=[];this.scale=1;this.drag=null;this.mediaUrls=new Map();this.timers=[];this.dirty=false;this.init()} fresh(){return{version:1,lastScene:0,ui:{grid:false,guides:false,snap:false,sceneMode:'none'},scenes:[{id:uid(),name:'通常画面',bg:'#ffffff',duration:10,objects:[]}]}} get scene(){return this.state.scenes[this.state.lastScene]||this.state.scenes[0]} async init(){try{await this.db.open();const s=await this.db.get(STORE,'doc');if(s&&this.valid(s))this.state=s}catch(e){toast('保存領域を利用できません。JSONバックアップを使ってください。')} this.bind();this.renderAll();setInterval(()=>this.updateClocks(),500);window.addEventListener('resize',()=>this.fit())}
valid(s){return s&&Array.isArray(s.scenes)&&s.scenes.length} mark(){this.dirty=true;$('#statusText').textContent='未保存';clearTimeout(this.autos);this.autos=setTimeout(()=>this.save(true),700)} hist(){this.undo.push(clone(this.state));if(this.undo.length>80)this.undo.shift();this.redo=[]} async save(auto=false){try{await this.db.put(STORE,'doc',this.state);this.dirty=false;$('#statusText').textContent='保存済み '+new Date().toLocaleTimeString(); if(!auto)toast('保存しました')}catch(e){toast('保存できませんでした')}}
obj(t){const base={id:uid(),type:t,name:{text:'テキスト',image:'画像',video:'動画',player:'メディア',clock:'時計',shape:'図形'}[t],x:220,y:160,w:480,h:270,rot:0,opacity:1,locked:false,visible:true,z:Date.now(),style:{}}; if(t==='text')Object.assign(base,{text:'テキストを入力',style:{fontSize:72,bold:false,color:'#111827',bg:'#ffffff00',align:'center',valign:'center',pad:20,border:false,borderColor:'#111827',radius:0}}); if(t==='clock')Object.assign(base,{format:'HH:mm',showDate:true,style:{fontSize:88,color:'#111827',bg:'#ffffff00',align:'center'}}); if(t==='shape')Object.assign(base,{shape:'rect',style:{fill:'#60a5fa',stroke:'#1d4ed8',strokeWidth:4,radius:0,lineWidth:8}}); if(t==='image')Object.assign(base,{fit:'contain',fileName:'未選択',file:null,keepRatio:true}); if(t==='video')Object.assign(base,{fit:'contain',fileName:'未選択',file:null,autoplay:true,loop:true,muted:true,controls:false}); if(t==='player')Object.assign(base,{fit:'contain',folderId:null,folderName:'未選択',imageCount:0,videoCount:0,order:'name',repeat:true,imageSeconds:5,muted:true,effect:'fade',subfolders:false,autoRefresh:false,refreshMinutes:5,files:[]}); return base}
add(t){this.hist();const o=this.obj(t);this.scene.objects.push(o);this.sel=[o.id];this.renderAll();this.mark(); if(t==='image'||t==='video')this.pickFile(o)}
bind(){document.addEventListener('keydown',e=>this.keys(e));$('#saveBtn').onclick=()=>this.save();$('#newBtn').onclick=()=>{if(confirm('新規作成しますか？')){this.hist();this.state=this.fresh();this.sel=[];this.renderAll();this.mark()}};$('#resetBtn').onclick=()=>{if(confirm('初期状態へ戻しますか？')){this.state=this.fresh();this.sel=[];this.renderAll();this.mark()}};$('#exportBtn').onclick=()=>this.export();$('#importBtn').onclick=()=>$('#importFile').click();$('#importFile').onchange=e=>this.import(e);['Text','Image','Video','Player','Rect','Clock'].forEach(n=>$('#add'+n).onclick=()=>this.add(n==='Rect'?'shape':n.toLowerCase()));['front','back','forward','backward'].forEach(id=>$('#'+id).onclick=()=>this.z(id));['alignLeft','alignCenter','alignRight','alignTop','alignMiddle','alignBottom','distH','distV','centerCanvas'].forEach(id=>$('#'+id).onclick=()=>this.align(id));$('#gridChk').onchange=e=>{this.state.ui.grid=e.target.checked;this.renderCanvas();this.mark()};$('#guideChk').onchange=e=>{this.state.ui.guides=e.target.checked;this.renderCanvas();this.mark()};$('#snapChk').onchange=e=>{this.state.ui.snap=e.target.checked;this.mark()};$('#playBtn').onclick=()=>this.startView();$('#viewer').onmousemove=()=>this.mouseView();$('#addScene').onclick=()=>this.sceneAdd();$('#dupScene').onclick=()=>this.sceneDup();$('#delScene').onclick=()=>this.sceneDel();$('#sceneUp').onclick=()=>this.sceneMove(-1);$('#sceneDown').onclick=()=>this.sceneMove(1);$('#prevScene').onclick=()=>this.switchScene(this.state.lastScene-1);$('#nextScene').onclick=()=>this.switchScene(this.state.lastScene+1);$('#sceneMode').onchange=e=>{this.state.ui.sceneMode=e.target.value;this.mark()};$('#toggleScenes').onclick=()=>$('#app').classList.toggle('collapsed')}
renderAll(){this.renderScenes();this.renderCanvas();this.renderProps();this.fit();$('#gridChk').checked=!!this.state.ui.grid;$('#guideChk').checked=!!this.state.ui.guides;$('#snapChk').checked=!!this.state.ui.snap;$('#sceneMode').value=this.state.ui.sceneMode||'none'}
renderScenes(){const l=$('#sceneList');l.textContent='';this.state.scenes.forEach((s,i)=>{const d=document.createElement('div');d.className='scene '+(i===this.state.lastScene?'active':'');d.tabIndex=0;d.textContent=`${i+1}. ${s.name}`;d.onclick=()=>this.switchScene(i);d.ondblclick=()=>{const n=prompt('シーン名',s.name);if(n){this.hist();s.name=n;this.renderScenes();this.mark()}};l.append(d)})}
renderCanvas(target=$('#canvas'), view=false){target.textContent='';target.className=(view?'viewCanvas':'canvas')+(this.state.ui.grid&&!view?' grid':'')+(this.state.ui.guides&&!view?' guides':'');target.style.background=this.scene.bg||'#fff';[...this.scene.objects].sort((a,b)=>a.z-b.z).forEach(o=>{if(!o.visible)return;target.append(this.el(o,view))});$('#empty').style.display=!view&&this.scene.objects.length?'none':'block'}
el(o,view){const d=document.createElement('div');d.className='obj '+(this.sel.includes(o.id)&&!view?'selected ':'')+(o.locked?'locked':'');d.dataset.id=o.id;Object.assign(d.style,{left:o.x+'px',top:o.y+'px',width:o.w+'px',height:o.h+'px',opacity:o.opacity,transform:`rotate(${o.rot||0}deg)`,zIndex:o.z}); if(o.type==='text'){const c=document.createElement('div');c.className='textObj';c.textContent=o.text||'';Object.assign(c.style,{fontSize:o.style.fontSize+'px',fontWeight:o.style.bold?'700':'400',color:o.style.color,background:o.style.bg,justifyContent:o.style.align==='left'?'flex-start':o.style.align==='right'?'flex-end':'center',alignItems:o.style.valign==='top'?'flex-start':o.style.valign==='bottom'?'flex-end':'center',padding:o.style.pad+'px',border:o.style.border?`2px solid ${o.style.borderColor}`:'0',borderRadius:o.style.radius+'px',textAlign:o.style.align});d.append(c)}
else if(o.type==='clock'){const c=document.createElement('div');c.className='textObj';c.textContent=this.clockText(o);Object.assign(c.style,{fontSize:o.style.fontSize+'px',color:o.style.color,background:o.style.bg,justifyContent:o.style.align==='left'?'flex-start':o.style.align==='right'?'flex-end':'center',alignItems:'center',textAlign:o.style.align});d.append(c)}
else if(o.type==='shape'){if(o.shape==='line'){d.style.height=(o.style.lineWidth||8)+'px';d.style.background=o.style.stroke}else{d.style.background=o.style.fill;d.style.border=`${o.style.strokeWidth}px solid ${o.style.stroke}`;d.style.borderRadius=(o.shape==='round'?o.style.radius||30:o.style.radius||0)+'px'}}
else if(o.type==='image'||o.type==='video'){this.mediaEl(d,o,view)} else if(o.type==='player'){const f=document.createElement('div');f.className='mediaFallback';f.textContent=view?'メディアを準備中':'メディアプレイヤー: '+o.folderName+'（画像'+o.imageCount+' / 動画'+o.videoCount+'）';d.append(f); if(view)setTimeout(()=>this.playList(d,o),0)}
if(!view){d.onpointerdown=e=>this.down(e,o);d.ondblclick=()=>{if(o.type==='text'){const n=prompt('テキスト内容',o.text);if(n!==null){this.hist();o.text=n;this.renderAll();this.mark()}}}; if(this.sel.includes(o.id))this.handles(d,o)} return d}
mediaEl(d,o,view){if(!o.file){const f=document.createElement('div');f.className='mediaFallback';f.textContent=o.fileName||'ファイル未選択';d.append(f);return}const url=URL.createObjectURL(o.file);this.mediaUrls.set(o.id,url);const m=document.createElement(o.type==='video'?'video':'img');m.src=url;m.style.width='100%';m.style.height='100%';m.style.objectFit=o.fit; if(o.type==='video'){m.autoplay=view||o.autoplay;m.loop=o.loop;m.muted=o.muted;m.controls=o.controls&&!view;m.onerror=()=>toast('動画を読み込めません'); if(view)m.play().catch(()=>{})}else m.onerror=()=>{d.textContent='';const f=document.createElement('div');f.className='mediaFallback';f.textContent='画像を読み込めません';d.append(f)};d.append(m)}
handles(d,o){['nw','n','ne','e','se','s','sw','w'].forEach(p=>{const h=document.createElement('i');h.className='handle h-'+p;const x=p.includes('w')?0:p.includes('e')?100:50,y=p.includes('n')?0:p.includes('s')?100:50;h.style.left=`calc(${x}% - 6px)`;h.style.top=`calc(${y}% - 6px)`;h.onpointerdown=e=>this.down(e,o,p);d.append(h)})}
down(e,o,handle){if(o.locked)return;e.stopPropagation();if(!e.ctrlKey&&!this.sel.includes(o.id))this.sel=[o.id];else if(e.ctrlKey)this.sel=this.sel.includes(o.id)?this.sel.filter(id=>id!==o.id):[...this.sel,o.id];this.renderAll();this.hist();this.drag={sx:e.clientX,sy:e.clientY,ids:[...this.sel],start:clone(this.scene.objects),handle};document.onpointermove=ev=>this.move(ev);document.onpointerup=()=>{document.onpointermove=document.onpointerup=null;this.drag=null;this.mark()}}
move(e){const dx=(e.clientX-this.drag.sx)/this.scale,dy=(e.clientY-this.drag.sy)/this.scale;this.drag.ids.forEach(id=>{const o=this.scene.objects.find(x=>x.id===id),s=this.drag.start.find(x=>x.id===id);if(!o||o.locked)return;if(this.drag.handle){if(this.drag.handle.includes('e'))o.w=Math.max(20,s.w+dx);if(this.drag.handle.includes('s'))o.h=Math.max(20,s.h+dy);if(this.drag.handle.includes('w')){o.x=clamp(s.x+dx,-o.w+20,W-20);o.w=Math.max(20,s.w-dx)}if(this.drag.handle.includes('n')){o.y=clamp(s.y+dy,-o.h+20,H-20);o.h=Math.max(20,s.h-dy)}}else{o.x=clamp(s.x+dx,-o.w+20,W-20);o.y=clamp(s.y+dy,-o.h+20,H-20);if(this.state.ui.snap){o.x=Math.round(o.x/10)*10;o.y=Math.round(o.y/10)*10;if(Math.abs(o.x+o.w/2-W/2)<8)o.x=W/2-o.w/2;if(Math.abs(o.y+o.h/2-H/2)<8)o.y=H/2-o.h/2}}});this.renderCanvas();this.renderProps()}
renderProps(){const p=$('#props');p.textContent='';const objs=this.scene.objects.filter(o=>this.sel.includes(o.id));if(!objs.length){p.textContent='オブジェクトを選択してください。';return} const common=objs.length>1; const o=objs[0]; const add=(sec,label,key,type='number',opts)=>{let det=p.querySelector(`[data-sec="${sec}"]`);if(!det){det=document.createElement('details');det.open=true;det.className='section';det.dataset.sec=sec;det.innerHTML='<summary></summary><div class="sectionBody"></div>';det.querySelector('summary').textContent=sec;p.append(det)}const f=document.createElement('label');f.className='field';const l=document.createElement('span');l.textContent=label;let inp= type==='textarea'?document.createElement('textarea'): type==='select'?document.createElement('select'):document.createElement('input');if(type==='select')opts.forEach(a=>{const op=document.createElement('option');op.value=a[0];op.textContent=a[1];inp.append(op)});else inp.type=type;inp.value=key.split('.').reduce((a,k)=>a&&a[k],o)??'';inp.onchange=()=>{this.hist();objs.forEach(ob=>this.setPath(ob,key,inp.type==='checkbox'?inp.checked:inp.type==='number'?Number(inp.value):inp.value));this.renderAll();this.mark()}; if(type==='checkbox')inp.checked=!!key.split('.').reduce((a,k)=>a&&a[k],o);f.append(l,inp);det.querySelector('.sectionBody').append(f)}; add('位置とサイズ','名前','name','text');['x','y','w','h','rot','opacity'].forEach(k=>add('位置とサイズ',k,k));add('表示','ロック','locked','checkbox');add('表示','表示','visible','checkbox'); if(common)return; if(o.type==='text'){add('文字','内容','text','textarea');add('文字','サイズ','style.fontSize');add('文字','太字','style.bold','checkbox');add('文字','文字色','style.color','color');add('文字','配置','style.align','select',[['left','左'],['center','中央'],['right','右']]);add('背景と枠線','背景','style.bg','color');add('背景と枠線','余白','style.pad');add('背景と枠線','枠線','style.border','checkbox');add('背景と枠線','枠線色','style.borderColor','color');add('背景と枠線','角丸','style.radius')}
if(o.type==='clock'){add('文字','形式','format','select',[['HH:mm','HH:mm'],['HH:mm:ss','HH:mm:ss'],['yyyy年M月d日','yyyy年M月d日'],['yyyy年M月d日（曜）','yyyy年M月d日（曜）'],['datetime','日付＋時刻']]);add('文字','サイズ','style.fontSize');add('文字','文字色','style.color','color');add('文字','背景','style.bg','color');add('文字','配置','style.align','select',[['left','左'],['center','中央'],['right','右']])}
if(o.type==='image'||o.type==='video'){const b=document.createElement('button');b.textContent='ファイルを選択';b.onclick=()=>this.pickFile(o);p.append(b);add('メディア','ファイル名','fileName','text');add('メディア','表示方法','fit','select',[['contain','全体を表示'],['cover','領域を埋める'],['fill','引き伸ばす']]); if(o.type==='video'){['loop','muted','controls'].forEach(k=>add('再生',k,k,'checkbox'))}}

setPath(o,path,val){const a=path.split('.');let x=o;while(a.length>1)x=x[a.shift()];x[a[0]]=val}
async pickFile(o){const inp=document.createElement('input');inp.type='file';inp.accept=o.type==='image'?'image/*':'video/*';inp.onchange=()=>{if(inp.files[0]){this.hist();o.file=inp.files[0];o.fileName=o.file.name;this.renderAll();this.mark()}};inp.click()}
async pickFolder(o){if(!window.showDirectoryPicker){toast('このブラウザではフォルダ選択を利用できません');return}try{const h=await showDirectoryPicker();o.folderId=uid();o.folderName=h.name;await this.db.put(HANDLE,o.folderId,h);await this.refreshFolder(o)}catch(e){toast('フォルダ選択を中止しました')}} async refreshFolder(o){try{const h=await this.db.get(HANDLE,o.folderId);if(!h){toast('フォルダを再選択してください');return}const files=[];await this.scan(h,files,o.subfolders);files.sort((a,b)=>a.name.localeCompare(b.name,'ja',{numeric:true}));o.files=files.map(f=>({name:f.name,type:imgExt.test(f.name)?'image':'video'}));o.imageCount=o.files.filter(f=>f.type==='image').length;o.videoCount=o.files.filter(f=>f.type==='video').length;this.renderAll();this.mark();toast('フォルダを更新しました')}catch(e){toast('フォルダを読み込めません。再選択してください')}} async scan(dir,out,sub){for await(const [n,h] of dir.entries()){if(h.kind==='file'&&(imgExt.test(n)||vidExt.test(n)))out.push(await h.getFile());else if(sub&&h.kind==='directory')await this.scan(h,out,true)}}
async playList(box,o){const h=await this.db.get(HANDLE,o.folderId);if(!h){box.innerHTML='<div class="mediaFallback">フォルダを再選択してください</div>';return}let files=[];try{await this.scan(h,files,o.subfolders)}catch(e){box.innerHTML='<div class="mediaFallback">フォルダを読み込めません</div>';return}files=files.filter(f=>imgExt.test(f.name)||vidExt.test(f.name));if(!files.length){box.innerHTML='<div class="mediaFallback">フォルダに再生可能なファイルがありません</div>';return}files.sort((a,b)=>a.name.localeCompare(b.name,'ja',{numeric:true}));let i=-1,last=null;const next=()=>{if(o.order==='random'){let n;do{n=Math.floor(Math.random()*files.length)}while(files.length>1&&n===last);i=n;last=n}else{i++;if(i>=files.length){if(!o.repeat)return;i=0}};show(files[i])};const show=f=>{box.textContent='';const url=URL.createObjectURL(f);const isV=vidExt.test(f.name);const m=document.createElement(isV?'video':'img');m.src=url;m.style.width='100%';m.style.height='100%';m.style.objectFit=o.fit;m.onerror=next;if(isV){m.autoplay=true;m.muted=o.muted;m.onended=next;m.play().catch(next)}else this.timers.push(setTimeout(next,(o.imageSeconds||5)*1000));box.append(m)};next()}
keys(e){const tag=document.activeElement.tagName;if(['INPUT','TEXTAREA','SELECT'].includes(tag))return; if(e.key==='Delete'){this.hist();this.scene.objects=this.scene.objects.filter(o=>!this.sel.includes(o.id)||o.locked);this.sel=[];this.renderAll();this.mark()} if(e.ctrlKey&&e.key.toLowerCase()==='c'){this.clip=this.scene.objects.filter(o=>this.sel.includes(o.id)).map(clone)} if(e.ctrlKey&&e.key.toLowerCase()==='v'){this.hist();this.clip.forEach(c=>{c=clone(c);c.id=uid();c.x+=30;c.y+=30;c.name+=' コピー';this.scene.objects.push(c);this.sel=[c.id]});this.renderAll();this.mark()} if(e.ctrlKey&&e.key.toLowerCase()==='d'){this.clip=this.scene.objects.filter(o=>this.sel.includes(o.id)).map(clone);this.keys({ctrlKey:true,key:'v',preventDefault(){}})} if(e.ctrlKey&&e.key.toLowerCase()==='z'){const p=this.undo.pop();if(p){this.redo.push(clone(this.state));this.state=p;this.sel=[];this.renderAll();this.mark()}} if(e.ctrlKey&&e.key.toLowerCase()==='y'){const p=this.redo.pop();if(p){this.undo.push(clone(this.state));this.state=p;this.sel=[];this.renderAll();this.mark()}} if(e.ctrlKey&&e.key.toLowerCase()==='a'){this.sel=this.scene.objects.map(o=>o.id);this.renderAll();e.preventDefault()} if(e.key==='Escape'){if($('#viewer').style.display==='flex')this.stopView();else{this.sel=[];this.renderAll()}} if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)){this.hist();const n=e.shiftKey?10:1;this.scene.objects.filter(o=>this.sel.includes(o.id)&&!o.locked).forEach(o=>{if(e.key==='ArrowLeft')o.x-=n;if(e.key==='ArrowRight')o.x+=n;if(e.key==='ArrowUp')o.y-=n;if(e.key==='ArrowDown')o.y+=n;o.x=clamp(o.x,-o.w+20,W-20);o.y=clamp(o.y,-o.h+20,H-20)});this.renderAll();this.mark();e.preventDefault()}}
z(id){this.hist();const os=this.scene.objects.filter(o=>this.sel.includes(o.id));os.forEach(o=>{if(id==='front')o.z=Date.now()+Math.random()*1000;if(id==='back')o.z=0;if(id==='forward')o.z+=1000;if(id==='backward')o.z-=1000});this.renderAll();this.mark()} align(id){const os=this.scene.objects.filter(o=>this.sel.includes(o.id));if(id!=='centerCanvas'&&os.length<2)return;this.hist();if(id==='centerCanvas')os.forEach(o=>{o.x=(W-o.w)/2;o.y=(H-o.h)/2});let minX=Math.min(...os.map(o=>o.x)),maxR=Math.max(...os.map(o=>o.x+o.w)),minY=Math.min(...os.map(o=>o.y)),maxB=Math.max(...os.map(o=>o.y+o.h));os.forEach(o=>{if(id==='alignLeft')o.x=minX;if(id==='alignRight')o.x=maxR-o.w;if(id==='alignCenter')o.x=(minX+maxR-o.w)/2;if(id==='alignTop')o.y=minY;if(id==='alignBottom')o.y=maxB-o.h;if(id==='alignMiddle')o.y=(minY+maxB-o.h)/2}); if(id==='distH'){os.sort((a,b)=>a.x-b.x);const gap=(maxR-minX-os.reduce((s,o)=>s+o.w,0))/(os.length-1);let x=minX;os.forEach(o=>{o.x=x;x+=o.w+gap})} if(id==='distV'){os.sort((a,b)=>a.y-b.y);const gap=(maxB-minY-os.reduce((s,o)=>s+o.h,0))/(os.length-1);let y=minY;os.forEach(o=>{o.y=y;y+=o.h+gap})}this.renderAll();this.mark()}
sceneAdd(){this.hist();this.state.scenes.push({id:uid(),name:'新しいシーン',bg:'#ffffff',duration:10,objects:[]});this.state.lastScene=this.state.scenes.length-1;this.sel=[];this.renderAll();this.mark()} sceneDup(){this.hist();const s=clone(this.scene);s.id=uid();s.name+=' コピー';s.objects.forEach(o=>o.id=uid());this.state.scenes.splice(this.state.lastScene+1,0,s);this.state.lastScene++;this.renderAll();this.mark()} sceneDel(){if(this.state.scenes.length<2){toast('最後のシーンは削除できません');return}if(confirm('シーンを削除しますか？')){this.hist();this.state.scenes.splice(this.state.lastScene,1);this.state.lastScene=0;this.sel=[];this.renderAll();this.mark()}} sceneMove(d){const i=this.state.lastScene,j=i+d;if(j<0||j>=this.state.scenes.length)return;this.hist();[this.state.scenes[i],this.state.scenes[j]]=[this.state.scenes[j],this.state.scenes[i]];this.state.lastScene=j;this.renderAll();this.mark()} switchScene(i){if(i<0||i>=this.state.scenes.length)return;this.state.lastScene=i;this.sel=[];this.renderAll();this.mark()}
clockText(o){const d=new Date(),w='日月火水木金土'[d.getDay()],p=n=>String(n).padStart(2,'0');if(o.format==='HH:mm')return `${p(d.getHours())}:${p(d.getMinutes())}`;if(o.format==='HH:mm:ss')return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;if(o.format==='yyyy年M月d日')return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;if(o.format==='yyyy年M月d日（曜）')return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w}）`;return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w}） ${p(d.getHours())}:${p(d.getMinutes())}`} updateClocks(){document.querySelectorAll('.obj').forEach(el=>{const o=this.scene.objects.find(x=>x.id===el.dataset.id);if(o&&o.type==='clock')el.querySelector('.textObj').textContent=this.clockText(o)})}
fit(){const w=$('#workspace').clientWidth-40,h=$('#workspace').clientHeight-40;this.scale=Math.min(w/W,h/H,1);$('#canvas').style.transform=`scale(${this.scale})`;$('.canvasWrap').style.width=W*this.scale+'px';$('.canvasWrap').style.height=H*this.scale+'px';$('#empty').style.left='0';$('#empty').style.right='0';$('#empty').style.top='45%';$('#zoomText').textContent=`${Math.round(this.scale*100)}% / 1920×1080`}
async startView(){await this.save(true);$('#viewer').style.display='flex';this.renderCanvas($('#viewCanvas'),true);this.scaleView();try{await $('#viewer').requestFullscreen()}catch(e){toast('全画面表示できませんでした')}this.mouseView();this.sceneTimer()} stopView(){this.timers.forEach(clearTimeout);this.timers=[];$('#viewer').style.display='none';if(document.fullscreenElement)document.exitFullscreen().catch(()=>{});this.renderAll()} mouseView(){const v=$('#viewer');v.classList.remove('hideCursor');clearTimeout(this.curTimer);this.curTimer=setTimeout(()=>v.classList.add('hideCursor'),3000)} scaleView(){const s=Math.min(innerWidth/W,innerHeight/H);$('#viewCanvas').style.transform=`scale(${s})`} sceneTimer(){clearTimeout(this.sceneT);const mode=this.state.ui.sceneMode;if(mode==='none')return;this.sceneT=setTimeout(()=>{let n=mode==='random'?Math.floor(Math.random()*this.state.scenes.length):this.state.lastScene+1;if(n>=this.state.scenes.length)n=0;this.state.lastScene=n;this.startView()},(this.scene.duration||10)*1000)}
export(){const data=clone(this.state);data.note='JSONにはフォルダ権限とローカルメディア実体は含まれません。復元後に再指定してください。';const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='isignage-backup.json';a.click()} import(e){const f=e.target.files[0];if(!f)return;f.text().then(t=>{try{const s=JSON.parse(t);if(!this.valid(s))throw Error();this.hist();this.state=s;this.sel=[];this.renderAll();this.mark();toast('読み込みました。フォルダは必要に応じて再指定してください')}catch(_){toast('JSONを読み込めませんでした')}})} }
