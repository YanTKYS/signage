<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>iSignage</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --panel: #ffffff;
        --line: #d8dee9;
        --text: #202938;
        --muted: #6b7280;
        --blue: #2563eb;
        --blue-soft: #dbeafe;
        --danger: #dc2626;
        --shadow: 0 10px 25px #0f172a18;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      button,
      input,
      select,
      textarea {
        font: inherit;
      }
      button {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 10px;
        background: #fff;
        cursor: pointer;
      }
      button:hover:not(:disabled) {
        background: #f8fafc;
        border-color: #a8b5c7;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }
      .primary {
        border-color: var(--blue);
        background: var(--blue);
        color: #fff;
      }
      .danger {
        color: var(--danger);
      }
      .app {
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        height: 100vh;
      }
      .menubar,
      .toolbar,
      .status {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 8px 12px;
        border-bottom: 1px solid var(--line);
        background: #fff;
      }
      .menubar {
        justify-content: space-between;
      }
      .menu-group,
      .row {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
      }
      .toolbar {
        background: #fbfdff;
      }
      .main {
        display: grid;
        grid-template-columns: 270px 1fr 330px;
        min-height: 0;
      }
      .left,
      .right {
        overflow: auto;
        padding: 12px;
        background: var(--panel);
      }
      .left {
        border-right: 1px solid var(--line);
      }
      .right {
        border-left: 1px solid var(--line);
      }
      .workspace {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 0;
        overflow: hidden;
        background: #e8edf5;
      }
      .canvas-wrap {
        position: relative;
      }
      .canvas,
      .view-canvas {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #fff;
        transform-origin: top left;
      }
      .canvas {
        box-shadow: var(--shadow);
      }
      .canvas.grid {
        background-image:
          linear-gradient(#e5e7eb 1px, transparent 1px),
          linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .guides::before,
      .guides::after {
        content: "";
        position: absolute;
        z-index: 9000;
        pointer-events: none;
        background: #60a5fa99;
      }
      .guides::before {
        top: 0;
        left: 50%;
        width: 2px;
        height: 100%;
      }
      .guides::after {
        top: 50%;
        left: 0;
        width: 100%;
        height: 2px;
      }
      .object-shell {
        position: absolute;
        overflow: visible;
        user-select: none;
        outline: 0;
      }
      .object-shell.locked {
        cursor: not-allowed;
      }
      .object-content {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .object-shell.selected {
        z-index: 20000 !important;
      }
      .object-shell.selected > .object-content {
        outline: 3px solid var(--blue);
      }
      .handle {
        position: absolute;
        z-index: 20001;
        width: 14px;
        height: 14px;
        border: 2px solid var(--blue);
        border-radius: 50%;
        background: #fff;
      }
      .h-nw,
      .h-se {
        cursor: nwse-resize;
      }
      .h-ne,
      .h-sw {
        cursor: nesw-resize;
      }
      .h-n,
      .h-s {
        cursor: ns-resize;
      }
      .h-e,
      .h-w {
        cursor: ew-resize;
      }
      .selection-box {
        position: absolute;
        z-index: 21000;
        border: 1px dashed var(--blue);
        background: #2563eb18;
        pointer-events: none;
      }
      .text-object {
        display: flex;
        width: 100%;
        height: 100%;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .media-fallback {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        padding: 20px;
        background: #111827;
        color: #fff;
        text-align: center;
        white-space: pre-wrap;
      }
      .scene-card {
        margin-bottom: 8px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
      }
      .scene-card.active {
        border-color: var(--blue);
        background: var(--blue-soft);
      }
      .section {
        margin-bottom: 10px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
      }
      .section summary {
        padding: 10px;
        background: #f8fafc;
        font-weight: 700;
        cursor: pointer;
      }
      .section-body {
        display: grid;
        gap: 8px;
        padding: 10px;
      }
      .field {
        display: grid;
        grid-template-columns: 112px 1fr;
        gap: 8px;
        align-items: center;
      }
      .field input,
      .field select,
      .field textarea {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 6px;
      }
      .field textarea {
        min-height: 80px;
        resize: vertical;
      }
      .empty-message {
        position: absolute;
        top: 45%;
        right: 0;
        left: 0;
        color: #64748b;
        font-size: 28px;
        text-align: center;
        pointer-events: none;
      }
      .toast {
        position: fixed;
        bottom: 26px;
        left: 50%;
        z-index: 30000;
        padding: 10px 16px;
        border-radius: 999px;
        background: #0f172a;
        color: #fff;
        opacity: 0;
        transform: translateX(-50%);
        transition: opacity 0.2s;
      }
      .toast.show {
        opacity: 1;
      }
      .view-mode {
        position: fixed;
        inset: 0;
        z-index: 20000;
        display: none;
        align-items: center;
        justify-content: center;
        background: #000;
        cursor: default;
      }
      .view-mode.hide-cursor {
        cursor: none;
      }
      .view-canvas {
        transform-origin: center center;
      }
      .status {
        justify-content: space-between;
        border-top: 1px solid var(--line);
        border-bottom: 0;
        color: var(--muted);
        font-size: 13px;
      }
      .collapsed .left {
        display: none;
      }
      .collapsed .main {
        grid-template-columns: 1fr 330px;
      }
      input[type="file"] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app" class="app">
      <div class="menubar">
        <div class="menu-group">
          <strong>iSignage</strong>
          <button id="newBtn" title="確認後、履歴をクリアして新規作成します">
            新規
          </button>
          <button id="saveBtn">保存</button>
          <button id="exportBtn">JSON出力</button>
          <button id="importBtn">JSON読込</button>
          <button id="resetBtn" class="danger">初期化</button>
          <input id="importFile" type="file" accept="application/json" />
        </div>
        <button id="playBtn" class="primary">▶ 表示開始</button>
      </div>
      <div class="toolbar">
        <button id="addText">テキスト</button>
        <button id="addImage">画像</button>
        <button id="addVideo">動画</button>
        <button id="addPlayer">メディア</button>
        <button id="addRect">図形</button>
        <button id="addClock">時計</button>
        <span>|</span>
        <button id="front" data-needs-selection title="選択が必要です">
          最前面
        </button>
        <button id="back" data-needs-selection title="選択が必要です">
          最背面
        </button>
        <button id="forward" data-needs-selection title="選択が必要です">
          前面
        </button>
        <button id="backward" data-needs-selection title="選択が必要です">
          背面
        </button>
        <button id="alignLeft" data-needs-multi title="2件以上の選択が必要です">
          左揃え
        </button>
        <button
          id="alignCenter"
          data-needs-multi
          title="2件以上の選択が必要です"
        >
          水平中央
        </button>
        <button
          id="alignRight"
          data-needs-multi
          title="2件以上の選択が必要です"
        >
          右揃え
        </button>
        <button id="alignTop" data-needs-multi title="2件以上の選択が必要です">
          上揃え
        </button>
        <button
          id="alignMiddle"
          data-needs-multi
          title="2件以上の選択が必要です"
        >
          垂直中央
        </button>
        <button
          id="alignBottom"
          data-needs-multi
          title="2件以上の選択が必要です"
        >
          下揃え
        </button>
        <button id="distH" data-needs-three title="3件以上の選択が必要です">
          水平等間隔
        </button>
        <button id="distV" data-needs-three title="3件以上の選択が必要です">
          垂直等間隔
        </button>
        <button id="centerCanvas" data-needs-selection title="選択が必要です">
          中央配置
        </button>
        <label><input id="gridChk" type="checkbox" />グリッド</label>
        <label><input id="snapChk" type="checkbox" />吸着</label>
        <label><input id="guideChk" type="checkbox" />中央線</label>
      </div>
      <div class="main">
        <aside class="left">
          <div class="row">
            <button id="toggleScenes">折りたたみ</button
            ><button id="addScene">追加</button
            ><button id="dupScene">複製</button
            ><button id="delScene" class="danger">削除</button>
          </div>
          <div class="row">
            <button id="sceneUp">上へ</button
            ><button id="sceneDown">下へ</button
            ><button id="prevScene">前へ</button
            ><button id="nextScene">次へ</button>
          </div>
          <hr />
          <div id="sceneList"></div>
          <details open class="section">
            <summary>シーン設定</summary>
            <div class="section-body" id="sceneSettings"></div>
          </details>
          <details open class="section">
            <summary>シーン切替</summary>
            <div class="section-body">
              <label class="field"
                ><span>方法</span
                ><select id="sceneMode">
                  <option value="none">切り替えない</option>
                  <option value="sequence">指定秒数ごと</option>
                  <option value="random">ランダム</option>
                </select></label
              >
            </div>
          </details>
        </aside>
        <main class="workspace" id="workspace">
          <div class="canvas-wrap" id="canvasWrap">
            <div id="canvas" class="canvas"></div>
            <div id="empty" class="empty-message">
              上の「挿入」から、テキストやメディアを追加してください。
            </div>
          </div>
        </main>
        <aside class="right">
          <h3>プロパティ</h3>
          <div id="props">オブジェクトを選択してください。</div>
        </aside>
      </div>
      <div class="status">
        <span id="statusText">未保存</span><span id="zoomText">1920×1080</span>
      </div>
    </div>
    <div id="viewer" class="view-mode">
      <div id="viewCanvas" class="view-canvas"></div>
    </div>
    <div id="toast" class="toast"></div>
    <script>
      (() => {
        "use strict";
        const W = 1920;
        const H = 1080;
        const DB = "isignage-db";
        const STORE = "state";
        const HANDLES = "handles";
        const IMG = /\.(jpe?g|png|gif|webp|bmp)$/i;
        const VID = /\.(mp4|webm|ogg|mov|m4v)$/i;
        const TYPES = new Set([
          "text",
          "image",
          "video",
          "player",
          "clock",
          "shape",
        ]);
        const $ = (selector) => document.querySelector(selector);
        const uid = () =>
          `id_${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;
        const copy = (value) => structuredClone(value);
        function clamp(value, min, max, fallback) {
          const number = Number(value);
          if (!Number.isFinite(number)) return fallback;
          return Math.max(min, Math.min(max, number));
        }
        function color(value, fallback = "#ffffff") {
          if (typeof value === "string" && /^#[0-9a-f]{8}$/i.test(value))
            return value.slice(0, 7);
          return typeof value === "string" && /^#[0-9a-f]{6}$/i.test(value)
            ? value
            : fallback;
        }
        function legacyAlpha(value, fallback = 1) {
          if (typeof value === "string" && /^#[0-9a-f]{8}$/i.test(value))
            return parseInt(value.slice(7), 16) / 255;
          return fallback;
        }
        function rgba(hex, alpha) {
          const safe = color(hex);
          const r = parseInt(safe.slice(1, 3), 16);
          const g = parseInt(safe.slice(3, 5), 16);
          const b = parseInt(safe.slice(5, 7), 16);
          return `rgba(${r}, ${g}, ${b}, ${clamp(alpha, 0, 1, 1)})`;
        }
        function toast(message) {
          const el = $("#toast");
          el.textContent = message;
          el.classList.add("show");
          clearTimeout(toast.timer);
          toast.timer = setTimeout(() => el.classList.remove("show"), 2200);
        }
        class ObjectUrlManager {
          constructor() {
            this.urls = new Map();
          }
          create(key, file) {
            this.revoke(key);
            const url = URL.createObjectURL(file);
            this.urls.set(key, url);
            return url;
          }
          revoke(key) {
            const url = this.urls.get(key);
            if (url) {
              URL.revokeObjectURL(url);
              this.urls.delete(key);
            }
          }
          revokePrefix(prefix) {
            for (const key of [...this.urls.keys()]) {
              if (key.startsWith(prefix)) this.revoke(key);
            }
          }
          revokeAll() {
            for (const key of [...this.urls.keys()]) this.revoke(key);
          }
        }
        class DBM {
          async open() {
            return new Promise((resolve, reject) => {
              const req = indexedDB.open(DB, 1);
              req.onupgradeneeded = () => {
                req.result.createObjectStore(STORE);
                req.result.createObjectStore(HANDLES);
              };
              req.onsuccess = () => {
                this.db = req.result;
                resolve();
              };
              req.onerror = () => reject(req.error);
            });
          }
          store(name, mode = "readonly") {
            return this.db.transaction(name, mode).objectStore(name);
          }
          get(name, key) {
            return new Promise((resolve) => {
              const req = this.store(name).get(key);
              req.onsuccess = () => resolve(req.result);
              req.onerror = () => resolve(null);
            });
          }
          put(name, key, value) {
            return new Promise((resolve, reject) => {
              const req = this.store(name, "readwrite").put(value, key);
              req.onsuccess = () => resolve();
              req.onerror = () => reject(req.error);
            });
          }
          delete(name, key) {
            return new Promise((resolve) => {
              const req = this.store(name, "readwrite").delete(key);
              req.onsuccess = () => resolve();
              req.onerror = () => resolve();
            });
          }
          clear(name) {
            return new Promise((resolve) => {
              const req = this.store(name, "readwrite").clear();
              req.onsuccess = () => resolve();
              req.onerror = () => resolve();
            });
          }
          keys(name) {
            return new Promise((resolve) => {
              const req = this.store(name).getAllKeys();
              req.onsuccess = () => resolve(req.result || []);
              req.onerror = () => resolve([]);
            });
          }
        }
        class MediaSession {
          constructor(app, container, object, sceneId) {
            this.app = app;
            this.container = container;
            this.object = object;
            this.sceneId = sceneId;
            this.files = [];
            this.index = -1;
            this.lastRandom = -1;
            this.failed = new Set();
            this.switchTimer = null;
            this.refreshTimer = null;
            this.media = null;
            this.stopped = false;
            this.urlKey = `view:${sceneId}:${object.id}:player`;
          }
          async start() {
            this.files = await this.app.scanPlayer(this.object, false);
            if (this.files === null) {
              this.fallback(
                "フォルダを読み込めません。\nフォルダを再選択するか権限を確認してください。",
              );
              this.startAutoRefresh();
              return;
            }
            this.startAutoRefresh();
            if (!this.files.length) {
              this.fallback("フォルダに再生可能なファイルがありません。");
              return;
            }
            this.next();
          }
          stop() {
            if (this.stopped) return;
            this.stopped = true;
            clearTimeout(this.switchTimer);
            clearInterval(this.refreshTimer);
            this.detach();
            this.app.urls.revoke(this.urlKey);
            this.container.textContent = "";
          }
          startAutoRefresh() {
            if (!this.object.autoRefresh) return;
            const minutes = clamp(this.object.refreshMinutes, 1, 1440, 5);
            this.object.refreshMinutes = minutes;
            this.refreshTimer = setInterval(
              async () => {
                const nextFiles = await this.app.scanPlayer(this.object, false);
                if (this.stopped || nextFiles === null) {
                  return;
                }
                this.files = nextFiles;
                this.failed.clear();
                this.lastRandom = -1;
                this.index = Math.min(this.index, this.files.length - 1);
              },
              minutes * 60 * 1000,
            );
          }
          chooseIndex() {
            if (this.object.order === "random" && this.files.length > 1) {
              for (let attempt = 0; attempt < 10; attempt += 1) {
                const candidate = Math.floor(Math.random() * this.files.length);
                if (
                  candidate !== this.lastRandom &&
                  !this.failed.has(candidate)
                ) {
                  this.lastRandom = candidate;
                  return candidate;
                }
              }
            }
            for (let attempt = 0; attempt < this.files.length; attempt += 1) {
              let nextIndex = this.index + 1;
              if (nextIndex >= this.files.length) {
                if (!this.object.repeat) return null;
                nextIndex = 0;
                this.failed.clear();
              }
              this.index = nextIndex;
              if (!this.failed.has(nextIndex)) return nextIndex;
            }
            return null;
          }
          next() {
            if (this.stopped) return;
            if (!this.files.length || this.failed.size >= this.files.length) {
              this.fallback(
                "メディアを再生できません。\nフォルダまたはファイルを確認してください。",
              );
              return;
            }
            const nextIndex = this.chooseIndex();
            if (nextIndex === null) return;
            this.index = nextIndex;
            this.show(this.files[nextIndex], nextIndex);
          }
          show(file, index) {
            this.detach();
            this.container.textContent = "";
            const url = this.app.urls.create(this.urlKey, file);
            const isVideo = VID.test(file.name);
            const media = document.createElement(isVideo ? "video" : "img");
            media.src = url;
            media.style.width = "100%";
            media.style.height = "100%";
            media.style.objectFit = this.object.fit;
            media.onerror = () => this.fail(index);
            this.media = media;
            this.container.append(media);
            if (isVideo) {
              media.autoplay = true;
              media.muted = Boolean(this.object.muted);
              media.onended = () => {
                this.failed.clear();
                this.next();
              };
              media.play().catch(() => this.fail(index));
            } else {
              this.failed.clear();
              this.switchTimer = setTimeout(
                () => this.next(),
                this.object.imageSeconds * 1000,
              );
            }
          }
          fail(index) {
            if (this.stopped) return;
            this.failed.add(index);
            this.detach();
            this.app.urls.revoke(this.urlKey);
            if (this.failed.size >= this.files.length) {
              this.fallback(
                "メディアを再生できません。\nフォルダまたはファイルを確認してください。",
              );
              return;
            }
            this.switchTimer = setTimeout(() => this.next(), 1500);
          }
          detach() {
            clearTimeout(this.switchTimer);
            if (this.media) {
              this.media.onerror = null;
              if (this.media.tagName === "VIDEO") {
                this.media.onended = null;
                this.media.pause();
                this.media.removeAttribute("src");
                this.media.load();
              }
            }
            this.media = null;
          }
          fallback(message) {
            this.detach();
            this.app.urls.revoke(this.urlKey);
            this.container.textContent = "";
            const div = document.createElement("div");
            div.className = "media-fallback";
            div.textContent = message;
            this.container.append(div);
          }
        }
        class App {
          constructor() {
            this.db = new DBM();
            this.urls = new ObjectUrlManager();
            this.state = this.fresh();
            this.sel = [];
            this.clip = [];
            this.undoStack = [];
            this.redoStack = [];
            this.scale = 1;
            this.drag = null;
            this.range = null;
            this.sessions = [];
            this.viewing = false;
            this.stopping = false;
            this.init();
          }
          fresh() {
            return {
              version: 2,
              lastScene: 0,
              ui: {
                grid: false,
                guides: false,
                snap: false,
                sceneMode: "none",
              },
              scenes: [this.scene("通常画面")],
            };
          }
          scene(name) {
            return {
              id: uid(),
              name,
              bg: "#ffffff",
              duration: 10,
              objects: [],
            };
          }
          get current() {
            return (
              this.state.scenes[this.state.lastScene] || this.state.scenes[0]
            );
          }
          async init() {
            try {
              await this.db.open();
              const saved = await this.db.get(STORE, "doc");
              if (saved) this.state = this.normalizeState(saved);
            } catch (error) {
              toast(
                "保存領域を利用できません。JSONバックアップを使ってください。",
              );
            }
            this.bind();
            this.renderAll();
            setInterval(() => this.updateClocks(), 500);
            window.addEventListener("resize", () => {
              this.fit();
              this.fitView();
            });
            document.addEventListener("fullscreenchange", () =>
              this.fullscreenChanged(),
            );

            this.dirty();
          }
          redo() {
            const next = this.redoStack.pop();
            if (!next) return;
            this.urls.revokeAll();
            this.undoStack.push(copy(this.state));
            this.state = this.normalizeState(next);
            this.sel = [];
            this.renderAll();
            this.dirty();
          }
          nudge(event) {
            const movable = this.current.objects.filter((object) => {
              return this.sel.includes(object.id) && !object.locked;
            });
            if (!movable.length) {
              return;
            }
            this.push();
            const amount = event.shiftKey ? 10 : 1;
            for (const object of movable) {
              if (event.key === "ArrowLeft") object.x -= amount;
              if (event.key === "ArrowRight") object.x += amount;
              if (event.key === "ArrowUp") object.y -= amount;
              if (event.key === "ArrowDown") object.y += amount;
              object.x = clamp(object.x, -object.w + 20, W - 20, object.x);
              object.y = clamp(object.y, -object.h + 20, H - 20, object.y);
            }
            this.renderAll();
            this.dirty();
            event.preventDefault();
          }
          z(action) {
            if (!this.sel.length) return;
            this.push();
            for (const object of this.current.objects.filter((item) =>
              this.sel.includes(item.id),
            )) {
              if (action === "front")
                object.z = Date.now() + Math.random() * 1000;
              if (action === "back") object.z = 0;
              if (action === "forward") object.z += 1000;
              if (action === "backward") object.z -= 1000;
            }
            this.renderAll();
            this.dirty();
          }
          align(action) {
            const objects = this.current.objects.filter((object) =>
              this.sel.includes(object.id),
            );
            if (
              action === "centerCanvas"
                ? !objects.length
                : action === "distH" || action === "distV"
                  ? objects.length < 3
                  : objects.length < 2
            )
              return;
            this.push();
            const minX = Math.min(...objects.map((o) => o.x));
            const maxR = Math.max(...objects.map((o) => o.x + o.w));
            const minY = Math.min(...objects.map((o) => o.y));
            const maxB = Math.max(...objects.map((o) => o.y + o.h));
            for (const o of objects) {
              if (action === "centerCanvas") {
                o.x = (W - o.w) / 2;
                o.y = (H - o.h) / 2;
              }
              if (action === "alignLeft") o.x = minX;
              if (action === "alignRight") o.x = maxR - o.w;
              if (action === "alignCenter") o.x = (minX + maxR - o.w) / 2;
              if (action === "alignTop") o.y = minY;
              if (action === "alignBottom") o.y = maxB - o.h;
              if (action === "alignMiddle") o.y = (minY + maxB - o.h) / 2;
            }
            if (action === "distH") {
              objects.sort((a, b) => a.x - b.x);
              const gap =
                (maxR - minX - objects.reduce((s, o) => s + o.w, 0)) /
                (objects.length - 1);
              let x = minX;
              for (const o of objects) {
                o.x = x;
                x += o.w + gap;
              }
            }
            if (action === "distV") {
              objects.sort((a, b) => a.y - b.y);
              const gap =
                (maxB - minY - objects.reduce((s, o) => s + o.h, 0)) /
                (objects.length - 1);
              let y = minY;
              for (const o of objects) {
                o.y = y;
                y += o.h + gap;
              }
            }
            this.renderAll();
            this.dirty();
          }
          addScene() {
            this.push();
            this.state.scenes.push(this.scene("新しいシーン"));
            this.state.lastScene = this.state.scenes.length - 1;
            this.sel = [];
            this.renderAll();
            this.dirty();
          }
          dupScene() {
            this.push();
            const scene = copy(this.current);
            scene.id = uid();
            scene.name = `${scene.name} コピー`;
            for (const object of scene.objects) object.id = uid();
            this.state.scenes.splice(this.state.lastScene + 1, 0, scene);
            this.state.lastScene += 1;
            this.sel = [];
            this.renderAll();
            this.dirty();
          }
          delScene() {
            if (this.state.scenes.length < 2) {
              toast("最後のシーンは削除できません");
              return;
            }
            if (!confirm("シーンを削除しますか？")) {
              return;
            }
            this.push();
            this.state.scenes.splice(this.state.lastScene, 1);
            this.state.lastScene = Math.max(0, this.state.lastScene - 1);
            this.sel = [];
            this.renderAll();
            this.dirty();
          }
          moveScene(delta) {
            const from = this.state.lastScene;
            const to = from + delta;
            if (to < 0 || to >= this.state.scenes.length) return;
            this.push();
            [this.state.scenes[from], this.state.scenes[to]] = [
              this.state.scenes[to],
              this.state.scenes[from],
            ];
            this.state.lastScene = to;
            this.renderAll();
            this.dirty();
          }
          switchScene(index) {
            if (index < 0 || index >= this.state.scenes.length) return;
            this.urls.revokePrefix("edit:");
            this.state.lastScene = index;
            this.sel = [];
            this.renderAll();
            this.dirty();
          }
          async startView() {
            await this.save(true);
            this.viewing = true;
            $("#viewer").style.display = "flex";
            this.renderViewScene();
            this.fitView();
            this.bumpCursor();
            try {
              await $("#viewer").requestFullscreen();
            } catch (error) {
              toast("全画面表示できませんでした。通常表示で継続します。");
            }
          }
          renderViewScene() {
            this.stopViewScene();
            this.urls.revokePrefix("view:");
            this.renderCanvas($("#viewCanvas"), true);
            this.scheduleScene();
          }
          stopViewScene() {
            clearTimeout(this.sceneTimer);
            this.sceneTimer = null;
            for (const session of this.sessions) session.stop();
            this.sessions = [];
            for (const video of $("#viewCanvas").querySelectorAll("video")) {
              video.onended = null;
              video.onerror = null;
              video.pause();
              video.removeAttribute("src");
              video.load();
            }
            $("#viewCanvas").textContent = "";
            this.urls.revokePrefix("view:");
          }
          scheduleScene() {
            if (
              this.state.ui.sceneMode === "none" ||
              this.state.scenes.length < 2
            )
              return;
            const seconds = clamp(this.current.duration, 1, 86400, 10);
            this.current.duration = seconds;
            this.sceneTimer = setTimeout(
              () => this.advanceScene(),
              seconds * 1000,
            );
          }
          advanceScene() {
            if (!this.viewing) return;
            let next = this.state.lastScene + 1;
            if (this.state.ui.sceneMode === "random") {
              if (this.state.scenes.length < 2) return;
              for (let attempt = 0; attempt < 10; attempt += 1) {
                const candidate = Math.floor(
                  Math.random() * this.state.scenes.length,
                );
                if (candidate !== this.state.lastScene) {
                  next = candidate;
                  break;
                }
              }
            }
            if (next >= this.state.scenes.length) next = 0;
            this.state.lastScene = next;
            this.renderViewScene();
          }
          stopView() {
            if (!this.viewing || this.stopping) return;
            this.stopping = true;
            this.viewing = false;
            this.stopViewScene();
            clearTimeout(this.cursorTimer);
            $("#viewer").classList.remove("hide-cursor");
            $("#viewer").style.display = "none";
            const finish = () => {
              this.stopping = false;
              this.renderAll();
            };
            if (document.fullscreenElement)
              document
                .exitFullscreen()
                .catch(() => undefined)
                .finally(finish);
            else finish();
          }
          fullscreenChanged() {
            if (this.viewing && !document.fullscreenElement && !this.stopping)
              this.stopView();
          }
          bumpCursor() {
            $("#viewer").classList.remove("hide-cursor");
            clearTimeout(this.cursorTimer);
            this.cursorTimer = setTimeout(
              () => $("#viewer").classList.add("hide-cursor"),
              3000,
            );
          }
          fit() {
            const workspace = $("#workspace");
            this.scale = Math.min(
              (workspace.clientWidth - 40) / W,
              (workspace.clientHeight - 40) / H,
              1,
            );
            $("#canvas").style.transform = `scale(${this.scale})`;
            $("#canvasWrap").style.width = `${W * this.scale}px`;
            $("#canvasWrap").style.height = `${H * this.scale}px`;
            $("#zoomText").textContent =
              `${Math.round(this.scale * 100)}% / 1920×1080`;
          }
          fitView() {
            if (!this.viewing) return;
            $("#viewCanvas").style.transform =
              `scale(${Math.min(innerWidth / W, innerHeight / H)})`;
          }
          clockText(object) {
            const d = new Date();
            const wd = "日月火水木金土"[d.getDay()];
            const p = (n) => String(n).padStart(2, "0");
            if (object.format === "HH:mm")
              return `${p(d.getHours())}:${p(d.getMinutes())}`;
            if (object.format === "HH:mm:ss")
              return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
            if (object.format === "yyyy年M月d日")
              return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
            if (object.format === "yyyy年M月d日（曜）")
              return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日（${wd}）`;
            return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日（${wd}） ${p(d.getHours())}:${p(d.getMinutes())}`;
          }
          updateClocks() {
            for (const el of document.querySelectorAll(".object-shell")) {
              const object = this.current.objects.find(
                (item) => item.id === el.dataset.id,
              );
              const clock = el.querySelector(".clock-text");
              if (object && clock) clock.textContent = this.clockText(object);
            }
          }
          folderIdInUse(folderId, exceptObjectId = null) {
            // Undo/Redo履歴が残っている通常操作中はハンドル削除に使わない。
            // 履歴破棄後の明示的な整理処理を追加する場合のために残している。
            if (!folderId) {
              return false;
            }
            return this.state.scenes.some((scene) => {
              return scene.objects.some((object) => {
                return (
                  object.type === "player" &&
                  object.folderId === folderId &&
                  object.id !== exceptObjectId
                );
              });
            });
          }
          async deleteHandleIfUnused(folderId, exceptObjectId = null) {
            if (!folderId || this.folderIdInUse(folderId, exceptObjectId)) {
              return;
            }
            await this.db.delete(HANDLES, folderId);
          }
          async cleanupUnusedHandles() {
            const keys = await this.db.keys(HANDLES);
            for (const folderId of keys) {
              if (!this.folderIdInUse(folderId)) {
                await this.db.delete(HANDLES, folderId);
              }
            }
          }
          async resetDoc(message) {
            if (!confirm(message)) {
              return;
            }
            this.stopView();
            this.urls.revokeAll();
            clearTimeout(this.autosave);
            this.state = this.fresh();
            this.sel = [];
            this.clip = [];
            this.clearHistory();
            try {
              await this.db.clear(HANDLES);
            } catch (error) {
              // 初期化自体は継続する。
            }
            await this.save(true);
            this.renderAll();
          }
          exportJson() {
            const data = {
              app: "iSignage",
              format: "isignage-backup",
              ...copy(this.state),
            };
            data.note =
              "JSONにはフォルダ権限、ローカルメディアファイルの実体、単一ファイルの永続的な参照は含まれません。復元後に再指定してください。";
            const url = URL.createObjectURL(
              new Blob([JSON.stringify(data, null, 2)], {
                type: "application/json",
              }),
            );
            const anchor = document.createElement("a");
            anchor.href = url;
            anchor.download = "isignage-backup.json";
            anchor.click();
            URL.revokeObjectURL(url);
          }
          async importJson(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) {
              return;
            }
            try {
              const parsed = JSON.parse(await file.text());
              if (!this.isBackupShape(parsed)) {
                throw new Error("not isignage backup");
              }
              const normalized = this.normalizeState(copy(parsed));
              if (!normalized.scenes.length) {
                throw new Error("invalid scenes");
              }
              this.urls.revokeAll();
              this.push();
              this.state = normalized;
              this.sel = [];
              this.renderAll();
              this.dirty();
              toast(
                "読み込みました。フォルダと単一ファイルは必要に応じて再指定してください",
              );
            } catch (error) {
              toast(
                "iSignageのバックアップとして読み込めませんでした。ファイルの内容を確認してください。",
              );
            } finally {
              event.target.value = "";
            }
          }
          commands() {
            const count = this.sel.length;
            for (const b of document.querySelectorAll("[data-needs-selection]"))
              b.disabled = count === 0;
            for (const b of document.querySelectorAll("[data-needs-multi]"))
              b.disabled = count < 2;
            for (const b of document.querySelectorAll("[data-needs-three]"))
              b.disabled = count < 3;
            $("#delScene").disabled = this.state.scenes.length < 2;
            $("#sceneUp").disabled = this.state.lastScene === 0;
            $("#sceneDown").disabled =
              this.state.lastScene >= this.state.scenes.length - 1;
            $("#prevScene").disabled = this.state.lastScene === 0;
            $("#nextScene").disabled =
              this.state.lastScene >= this.state.scenes.length - 1;
          }
        }
        window.app = new App();
      })();
    </script>
  </body>
</html>
